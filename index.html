<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Day 1 - Expense Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #fafafa;
    }
    h1 {
      color: #222; 
      text-align: center;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: #fff; 
      padding: 20px; 
      border-radius: 8px; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    input {
      width: 100%; 
      margin-bottom: 10px; 
      padding: 8px; 
      border: 1px solid #ccc; 
      border-radius: 4px;
    }
    button{
      padding: 8px 12px; 
      border: none; 
      border-radius: 4px; 
      background: #4CAF50; 
      color: white; 
      cursor: pointer;
    }
    button:hover { 
      background: #45a049; 
    }
    ul li { 
      background: #f9f9f9; 
      margin: 5px 0; 
      padding: 8px; 
      display: flex; 
      justify-content: space-between; 
      border-radius: 4px;
    }
    ul li button { 
      background: #e74c3c; 
    } 
    ul li button:hover { 
      background: #c0392b; 
    } 
    .stats { 
      margin-top: 15px; 
      font-weight: bold; 
      background: #eef; 
      padding: 10px; 
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1> Daily Expense Manager </h1>
    <input id="amount" type="number" placeholder="Enter amount">
    <input id="category" type="text" placeholder="Enter category">
    <button type="button" onclick="addExpense()">Add Expense</button>
    <ul id="expenseList"></ul>
    <div class="stats">
      <p>Total Spent: <span id="total">0</span></p>
      <p>Highest Expense: <span id="highest">0</span></p>
    </div>
  </div>

  <script>
  
    let expenses = [];

    function addExpense() {
      const amount = parseFloat(document.getElementById('amount').value);
      const category = document.getElementById('category').value;

      if (!amount || !category) {
        alert("Please enter both amount and category!");
        return;
      }

      
      expenses.push({ amount, category });
      document.getElementById('amount').value = "";
      document.getElementById('category').value = "";

      renderExpenses();
      updateStats();
    }

    function removeExpense(index) {
      expenses.splice(index, 1); 
      renderExpenses();
      updateStats();
    }

    function renderExpenses() {
      const list = document.getElementById('expenseList');
      list.innerHTML = "";
      expenses.forEach((exp, i) => {
        list.innerHTML += `<li>${exp.category}: ₹${exp.amount} 
          <button onclick="removeExpense(${i})">Remove</button></li>`;
      });
    }

    function updateStats() {
      let total = 0;
      let highest = 0;

      for (let exp of expenses) {
        total += exp.amount;
        if (exp.amount > highest) {
          highest = exp.amount;
        }
      }

      document.getElementById('total').innerText = total;
      document.getElementById('highest').innerText = highest;
    }
  </script>
</body>
</html>
