<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h2 {
      color: #333;
    }
    input, button {
      margin: 5px;
      padding: 8px;
    }
    #expense-list {
      margin-top: 20px;
    }
    .expense-item {
      margin: 5px 0;
    }
    .highest {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Expense Manager</h2>

  <label>Amount:</label>
  <input type="number" id="amount" placeholder="e.g. 200">

  <label>Category:</label>
  <input type="text" id="category" placeholder="e.g. Food">

  <button onclick="addExpense()">Add Expense</button>

  <div id="expense-list"></div>
  <h3 id="total"></h3>
  <h3 id="highest"></h3>

  <script>
    let expenses = [];

    function addExpense() {
      let amount = parseFloat(document.getElementById("amount").value);
      let category = document.getElementById("category").value;

      if (amount && category) {
        expenses.push({ amount, category });
        document.getElementById("amount").value = "";
        document.getElementById("category").value = "";
        showExpenses();
      } else {
        alert("Please enter both amount and category!");
      }
    }

    function removeExpense(index) {
      if (index >= 0 && index < expenses.length) {
        expenses.splice(index, 1);
        showExpenses();
      }
    }

    function getTotal() {
      return expenses.reduce((sum, exp) => sum + exp.amount, 0);
    }

    function getMax() {
      if (expenses.length === 0) return null;
      return expenses.reduce((max, exp) => exp.amount > max.amount ? exp : max);
    }

    function showExpenses() {
      let listDiv = document.getElementById("expense-list");
      listDiv.innerHTML = "<h3>Your Expenses:</h3>";

      expenses.forEach((exp, index) => {
        listDiv.innerHTML += `
          <p class="expense-item">
            ${exp.category}: ₹${exp.amount}
            <button onclick="removeExpense(${index})">Remove</button>
          </p>`;
      });

      document.getElementById("total").innerText = "Total Spent: ₹" + getTotal();

      let highest = getMax();
      if (highest) {
        document.getElementById("highest").innerHTML =
          "Highest Expense: <span class='highest'>" + highest.category + " - ₹" + highest.amount + "</span>";
      } else {
        document.getElementById("highest").innerText = "";
      }
    }
  </script>
</body>
</html>
