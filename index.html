<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Day 1 - Expense Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h1 {
      color: #333;
    }
    .container {
      max-width: 400px;
      margin: auto;
    }
    input, button {
      margin: 6px 0;
      padding: 8px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: #f2f2f2;
      margin: 5px 0;
      padding: 8px;
      display: flex;
      justify-content: space-between;
    }
    .stats {
      margin-top: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1> Daily Expense Manager </h1>
    <input id="amount" type="number" placeholder="Enter amount">
    <input id="category" type="text" placeholder="Enter category">
    <button onclick="addExpense()">Add Expense</button>
    <ul id="expenseList"></ul>
    <div class="stats">
      <p>Total Spent: <span id="total">0</span></p>
      <p>Highest Expense: <span id="highest">0</span></p>
    </div>
  </div>

  <script>
    // Store expenses in an array
    let expenses = [];

    function addExpense() {
      const amount = parseFloat(document.getElementById('amount').value);
      const category = document.getElementById('category').value;

      if (!amount || !category) {
        alert("Please enter both amount and category!");
        return;
      }

      // Add expense object to array
      expenses.push({ amount, category });
      document.getElementById('amount').value = "";
      document.getElementById('category').value = "";

      renderExpenses();
      updateStats();
    }

    function removeExpense(index) {
      expenses.splice(index, 1); // remove one item at position index
      renderExpenses();
      updateStats();
    }

    function renderExpenses() {
      const list = document.getElementById('expenseList');
      list.innerHTML = "";
      expenses.forEach((exp, i) => {
        list.innerHTML += `<li>${exp.category}: ₹${exp.amount} 
          <button onclick="removeExpense(${i})">Remove</button></li>`;
      });
    }

    function updateStats() {
      let total = 0;
      let highest = 0;

      for (let exp of expenses) {
        total += exp.amount;
        if (exp.amount > highest) {
          highest = exp.amount;
        }
      }

      document.getElementById('total').innerText = total;
      document.getElementById('highest').innerText = highest;
    }
  </script>
</body>
</html>
